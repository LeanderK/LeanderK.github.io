short_bio_text_justify: false
short_bio: >-
  <p>
    I am a PhD student at the <a href="https://informatics.ed.ac.uk/" target="_blank">School of Informatics</a>,
    University of Edinburgh and part of the <a href="https://april-tools.github.io" target="_blank">APRIL Lab</a>.
    I am primarily supervised by <a href="http://nolovedeeplearning.com" target="_blank">Antonio Vergari</a>,
    who leads the lab, with <a href="https://michaelgutmann.github.io" target="_blank">Michael U. Gutmann</a>
    as my secondary advisor.
  </p>
  <p>
    I mainly work on <strong>probabilistic machine learning</strong>. Currently, I am interesting in making <strong>probabilistic predictions obey rules</strong>, so <strong>guaranteeing</strong> that the probability mass of the prediction only <strong>covers the space</strong> that is <strong>allowed by the rules</strong>. In practice, this means that I think a lot about how to calculate integrals over non-standard domains efficiently and exactly. But in general, i am open minded and curios!
  </p>
  <p>
    This line of work led to <strong>A Probabilistic Neuro-Symbolic Layer For Algebraic Constraint Satisfaction</strong>,
    which received the <strong>runner-up best student paper award</strong> at UAI 2025.
  </p>
  <p>
    My code is on <a href="https://github.com/LeanderK" target="_blank">GitHub</a>. Please do not hesitate to reach out to me via email if you have any questions or want to collaborate!
  </p>

